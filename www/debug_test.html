<!DOCTYPE html>
<html>
<head><title>Debug Test</title></head>
<body>
<h1>Button Debug Test</h1>
<button onclick="testClick()">Test Direct Click</button>
<div id="result" style="padding:20px; margin:10px; border:1px solid black;"></div>

<script>
function testClick() {
  document.getElementById('result').innerHTML += '<p>Direct click works! ' + new Date().toISOString() + '</p>';
}

// Test if app.js functions are accessible
window.addEventListener('load', function() {
  var r = document.getElementById('result');
  r.innerHTML += '<p>typeof openSaasPayModal: ' + typeof window.openSaasPayModal + '</p>';
  r.innerHTML += '<p>typeof toggleSaasStatus: ' + typeof window.toggleSaasStatus + '</p>';
  r.innerHTML += '<p>typeof openSaasEditCompany: ' + typeof window.openSaasEditCompany + '</p>';
  r.innerHTML += '<p>typeof openSaasDeleteCompany: ' + typeof window.openSaasDeleteCompany + '</p>';
  r.innerHTML += '<p>typeof openModal: ' + typeof window.openModal + '</p>';
  r.innerHTML += '<p>typeof closeModal: ' + typeof window.closeModal + '</p>';
  r.innerHTML += '<p>typeof loadSaasCompanies: ' + typeof window.loadSaasCompanies + '</p>';
  r.innerHTML += '<p>typeof apiRequest: ' + typeof window.apiRequest + '</p>';
});
</script>
</body>
</html>
